<!DOCTYPE html>
<html lang="si">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>සිංහල අවුරුදු නැකැත් 2026</title>
  <link rel="icon" type="image/x-icon" href="sun.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Sinhala:wght@100..900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Noto Serif Sinhala", serif;
    }

    body {
      background: #4a4800;
      font-family: "Noto Serif Sinhala", serif;
      color: #ffd700;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative
    }

    /* Header */
    .header {
      background: #3a3600;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid #6a6200
    }

    .back-btn {
      color: #ffd700;
      font-size: 22px;
      cursor: pointer;
      margin-right: 16px;
      line-height: 1
    }

    .header h1 {
      color: #ffd700;
      font-size: 19px;
      font-weight: 600
    }

    /* Hero */
    .hero {
      background: linear-gradient(180deg, #5a5600 0%, #3e3b00 100%);
      padding: 10px 10px 22px;
      text-align: center;
      position: relative;
      overflow: hidden
    }

    .hero-suns {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1
    }

    .sun-svg {
      width: 100px;
      height: 90px
    }

    .hero-text {
      position: relative;
      z-index: 2;
      margin-top: -10px
    }

    .hero-title {
      font-size: 44px;
      color: #ffd700;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .6);
      line-height: 1.1
    }

    .hero-sub {
      display: inline-block;
      background: rgba(0, 0, 0, .35);
      color: #ffd700;
      font-size: 17px;
      padding: 3px 18px;
      border-radius: 5px;
      margin-top: 4px;
    }

    .lotus-bg {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      opacity: .08
    }

    /* List */
    .list-wrap {
      padding: 14px 13px 100px
    }

    .nekath-card {
      background: #2b2900;
      border-radius: 60px;
      padding: 11px 14px 11px 11px;
      display: flex;
      align-items: center;
      gap: 13px;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      margin-bottom: 11px;
      border: 2px solid transparent
    }

    .nekath-card:hover {
      transform: scale(1.015);
      box-shadow: 0 4px 18px rgba(255, 215, 0, .18)
    }

    .nekath-card.next-up {
      border-color: #ffd700;
      box-shadow: 0 0 18px rgba(255, 215, 0, .25)
    }

    .nekath-card.past {
      opacity: .55
    }

    .icon-circle {
      background: #ffd700;
      border-radius: 50%;
      width: 54px;
      height: 54px;
      min-width: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px
    }

    .card-body h3 {
      font-size: 15.5px;
      color: #ffd700;
      font-weight: 700;
      line-height: 1.3
    }

    .card-body p {
      font-size: 12.5px;
      color: #c8a800;
      margin-top: 3px;
      line-height: 1.4
    }

    /* Countdown bar */
    .countdown-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #ffd700;
      padding: 13px 18px;
      text-align: center;
      z-index: 90
    }

    .cd-label {
      font-size: 13.5px;
      color: #2a2700;
      font-weight: 600
    }

    .cd-time {
      font-size: 20px;
      font-weight: 700;
      color: #1a1700;
      margin-top: 2px;
      letter-spacing: 1px;
      border-radius: 50px;
    }

    /* Modal overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .78);
      z-index: 200;
      justify-content: center;
      align-items: center;
      padding: 20px
    }

    .overlay.open {
      display: flex
    }

    .modal {
      background: #3c3900;
      border-radius: 22px;
      padding: 28px 22px 28px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      position: relative;
      animation: pop .25s ease
    }

    @keyframes pop {
      from {
        transform: scale(.85);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    .m-icon {
      background: #ffd700;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: -58px auto 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .4)
    }

    .m-close {
      position: absolute;
      top: 13px;
      right: 16px;
      color: #ffd700;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      background: rgba(0, 0, 0, .3);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .m-title {
      color: #ffd700;
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 13px
    }

    .m-desc {
      color: #d4b000;
      font-size: 14px;
      line-height: 1.7
    }

    .m-badge {
      display: inline-block;
      background: #ffd700;
      color: #2a2700;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 12px;
      margin-top: 12px
    }

    /* Splash Screen */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #4a4800;
      /* Matches body background */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-sun {
      width: 120px;
      height: 120px;
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

        short: "අප්‍රේල් මස 20 වන සඳුදා පූර්ව භාග 06.27 ට",
        time: new Date("2026-04-20T06:27:00"),
        desc: "අප්‍රේල් මස 20 වන සඳුදා පූර්ව භාග 06.27 ට ශුභ නැකතේ රැකී රක්ෂා සඳහා හෝ ව්‍යාපාර කටයුතු සඳහා ශුභ දිශාවෙන් පිටත් වීම සිදු කළ යුතු ය.",
        badge: "සඳුදා, අප්‍රේල් 20 | පූර්ව භාග. 06:27"
      },
      {
        id: 8, icon: "🌱",
        title: "පැළ සිටුවීම",
        short: "අප්‍රේල් මස 23 වන බ්‍රහස්පතින්දා පූර්ව භාග 09.01 ට",
        time: new Date("2026-04-23T09:01:00"),
        desc: "අප්‍රේල් මස 23 වන බ්‍රහස්පතින්දා පූර්ව භාග 09.01 ට ශුභ නැකතේ ශාක සිටුවීම ආරම්භ කළ යුතු ය. ශුභ දිශාවෙන් ශුභ රෝපණය ආරම්භ කිරීමෙන් කෘෂිකර්ම හා ගෘහස්ත ජීවිතය සශ්‍රීක වේ.",
        badge: "බ්‍රහස්පතින්දා, අප්‍රේල් 23 | පූර්ව භාග. 09:01"
      }
    ];

    const now = () => new Date();

    function getNextNekath() {
      const n = now();
      return nekath.find(k => k.time > n) || null;
    }

    function renderList() {
      const wrap = document.getElementById('listWrap');
      const n = now();
      wrap.innerHTML = '';
      const next = getNextNekath();
      nekath.forEach(k => {
        const div = document.createElement('div');
        div.className = 'nekath-card' + (k.time < n ? ' past' : '') + (next && next.id === k.id ? ' next-up' : '');
        div.innerHTML = `
      <div class="icon-circle">${k.icon}</div>
      <div class="card-body">
        <h3>${k.title}</h3>
        <p>${k.short}</p>
      </div>`;
        div.onclick = () => openModal(k);
        wrap.appendChild(div);
      });
    }

    function openModal(k) {
      document.getElementById('mIcon').textContent = k.icon;
      document.getElementById('mTitle').textContent = k.title;
      // document.getElementById('mDesc').textContent = k.desc;
      document.getElementById('mBadge').textContent = k.badge;
      document.getElementById('overlay').classList.add('open');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('overlay')) {
        document.getElementById('overlay').classList.remove('open');
      }
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateCountdown() {
      const next = getNextNekath();
      if (!next) {
        document.getElementById('cdLabel').textContent = 'සියලු නැකත් සම්පූර්ණ වී ඇත';
        document.getElementById('cdTime').textContent = '🎉 සුභ අලුත් අවුරුද්දක් වේවා!';
        return;
      }
      const diff = next.time - now();
      if (diff <= 0) { renderList(); updateCountdown(); return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('cdLabel').textContent = `${next.title}ට තව,`;
      let parts = [];
      if (d > 0) parts.push(`දින ${d}`);
      parts.push(`පැය ${pad(h)}`);
      parts.push(`විනාඩි ${pad(m)}`);
      parts.push(`තත්පර ${pad(s)} යි`);
      document.getElementById('cdTime').textContent = parts.join(' ');
    }

    renderList();
    updateCountdown();
    setInterval(updateCountdown, 1000);
    setInterval(renderList, 10000);

    /* Hide Splash Screen on load */
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
      }, 500); // 500ms delay to ensure the splash screen is visible briefly
    });
  </script>
</body>

</html>
